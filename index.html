<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Girlfriend — VRM Experience</title>
  <meta name="description"
    content="Interactive AI companion powered by VRM 3D model, Three.js, and procedural animation." />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Background gradient -->
  <div class="bg-gradient"></div>

  <!-- Loading overlay -->
  <div id="loading-overlay">
    <div class="loader-ring"></div>
    <div class="loader-text" id="loading-text">Loading VRM model…</div>
  </div>

  <!-- Three.js canvas -->
  <div id="canvas-container"></div>

  <!-- Top bar -->
  <div id="topbar">
    <div class="topbar-title">
      <span class="dot"></span>
      AI Girlfriend
    </div>
    <div class="topbar-status">
      <div id="ws-indicator"></div>
      <span id="ws-label" style="margin-right: 15px;">Connecting…</span>
      <select id="model-select"
        style="background: linear-gradient(135deg, #ff477e, #ff7096); color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 71, 126, 0.4); outline: none; transition: all 0.2s ease;">
        <option value="./model /model.vrm" style="color: black;">🌸 Model 1</option>
        <option value="./model /model1.vrm" style="color: black;">🎀 Model 2</option>
      </select>
    </div>
  </div>

  <!-- Emotion badge -->
  <div id="emotion-badge">neutral</div>

  <!-- Subtitle area -->
  <div id="subtitle-area">
    <div id="subtitle-text"></div>
  </div>

  <!-- Dialogue input -->
  <div id="dialogue-panel">
    <div class="input-row">
      <input id="dialogue-input" type="text" placeholder="Say something to her…" autocomplete="off"
        spellcheck="false" />
      <button id="send-btn">Send ↩</button>
    </div>
  </div>

  <!-- Three.js + VRM — local three-vrm build + CDN Three.js r163 -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/",
      "@pixiv/three-vrm": "/vrm-lib/packages/three-vrm/lib/three-vrm.module.js",
      "@pixiv/three-vrm-core": "/vrm-lib/packages/three-vrm-core/lib/three-vrm-core.module.js",
      "@pixiv/three-vrm-animation": "/vrm-lib/packages/three-vrm-animation/lib/three-vrm-animation.module.js",
      "@pixiv/three-vrm-springbone": "/vrm-lib/packages/three-vrm-springbone/lib/three-vrm-springbone.module.js",
      "@pixiv/three-vrm-node-constraint": "/vrm-lib/packages/three-vrm-node-constraint/lib/three-vrm-node-constraint.module.js",
      "@pixiv/three-vrm-materials-mtoon": "/vrm-lib/packages/three-vrm-materials-mtoon/lib/three-vrm-materials-mtoon.module.js",
      "fflate": "https://cdn.jsdelivr.net/npm/fflate@0.8.2/esm/browser.js"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</body>

</html>
